name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      APP_NAME: BiliBili
      BUNDLE_ID: com.workbili.app
      MARKETING_VERSION: 1.0.0
      PROJECT_PATH: BiliBili.xcodeproj
      SCHEME: BiliBili

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE_PATH="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -n 1)"
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          elif [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          else
            echo "No Xcode installation found on runner"
            ls /Applications
            exit 1
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen version

      - name: Generate Xcode project
        run: |
          set -euo pipefail
          rm -rf "$PROJECT_PATH"
          xcodegen generate
          test -f "$PROJECT_PATH/project.pbxproj"

      - name: Build unsigned app
        run: |
          set -eo pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            PRODUCT_NAME="$APP_NAME" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build | tee build.log

      - name: Locate built app
        run: |
          set -euo pipefail
          APP_PATH=$(find build/Build/Products -type d -name "$APP_NAME.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found"
            find build -maxdepth 4 -type d | sort
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found app: $APP_PATH"

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          rm -rf Payload
          mkdir -p Payload
          ditto "$APP_PATH" "Payload/$APP_NAME.app"
          /usr/bin/zip -qry "${APP_NAME}-unsigned.ipa" Payload
          rm -rf Payload
          ls -lh "${APP_NAME}-unsigned.ipa"

      - name: Archive logs and app bundle
        run: |
          set -euo pipefail
          cp build.log ci-build.log
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "${APP_NAME}-app.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workbili-ios-unsigned-${{ github.run_number }}
          path: |
            BiliBili-unsigned.ipa
            BiliBili-app.zip
            ci-build.log
          retention-days: 7

      - name: Create release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.run_attempt }}
          name: workbili build #${{ github.run_number }}.${{ github.run_attempt }}
          files: |
            BiliBili-unsigned.ipa
            BiliBili-app.zip
            ci-build.log
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

