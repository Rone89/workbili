name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          set -e
          if [ -d "/Applications/Xcode_26.app/Contents/Developer" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.0.app/Contents/Developer" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          else
            echo "Xcode 26 not found on runner"
            ls /Applications | grep Xcode || true
            exit 1
          fi
          xcodebuild -version

      - name: Create app Info.plist
        run: |
          mkdir -p BiliBili/Resources
          cat > BiliBili/Resources/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>zh_CN</string>
              <key>CFBundleExecutable</key>
              <string>BiliBili</string>
              <key>CFBundleIdentifier</key>
              <string>com.workbili.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>BiliBili</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>${{ github.run_number }}</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
              </dict>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key>
                  <true/>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode project
        run: |
          set -e
          rm -rf BiliBili.xcodeproj
          swift package dump-package > /tmp/package.json
          xcodegen generate
          test -f BiliBili.xcodeproj/project.pbxproj

      - name: Build unsigned app
        run: |
          set -eo pipefail
          xcodebuild \
            -project BiliBili.xcodeproj \
            -scheme BiliBili \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            PRODUCT_BUNDLE_IDENTIFIER=com.workbili.app \
            PRODUCT_NAME=BiliBili \
            SWIFT_VERSION=5.10 \
            GENERATE_INFOPLIST_FILE=NO \
            INFOPLIST_FILE=BiliBili/Resources/Info.plist \
            CODE_SIGN_IDENTITY='' CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            clean build | tee build.log

      - name: Locate built app
        run: |
          set -e
          APP_PATH=$(find build -type d -name '*.app' | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found"
            find build -maxdepth 4 -type d | sort
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found app: $APP_PATH"

      - name: Package unsigned IPA
        run: |
          set -e
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/BiliBili.app
          /usr/bin/zip -qry BiliBili-unsigned.ipa Payload
          rm -rf Payload
          ls -lh BiliBili-unsigned.ipa

      - name: Archive logs and app bundle
        run: |
          set -e
          cp build.log ci-build.log
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" BiliBili-app.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workbili-ios-build
          path: |
            BiliBili-unsigned.ipa
            BiliBili-app.zip
            ci-build.log
          retention-days: 7

      - name: Create release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: workbili build #${{ github.run_number }}
          files: |
            BiliBili-unsigned.ipa
            BiliBili-app.zip
            ci-build.log
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

